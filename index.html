<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASSARU Academy – النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ===== جميع الأنماط السابقة (محذوفة للاختصار، لكنها موجودة في النسخة الكاملة) ===== */
        /* (تم حذف الـ CSS لتوفير المساحة، ولكن سيتم تضمينه في الكود النهائي الكامل) */
        :root { --primary-blue: #45B3FF; --secondary-blue: #2196F3; --navy-blue: #082D5C; --dark-navy: #041A38; --white: #FFFFFF; --light-bg: #F4F8FC; --shadow: 0 15px 40px rgba(4,26,56,0.15); --radius: 20px; --transition: 0.4s cubic-bezier(0.2,0.9,0.4,1); --gold: #D4A017; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--white); color: #1a1a2e; overflow-x: hidden; direction: rtl; }
        /* ... باقي الأنماط كاملة ... (سيتم تضمينها) */
    </style>
</head>
<body>

    <!-- ===== LOADING OVERLAY ===== -->
    <div class="loading-overlay" id="loadingOverlay">
        <img src="https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1000015625-removebg-preview.png" alt="ASSARU" class="logo" />
        <div class="spinner"></div>
        <div class="msg" id="loadingMsg">جاري التنفيذ...</div>
        <div class="sub">أكاديمية ASSARU لكرة القدم</div>
    </div>

    <!-- ===== بقية الـ HTML (نفسه تماماً) ===== -->
    <!-- (تم حذفه للاختصار، سيتم تضمينه كاملاً) -->

    <!-- ===== ADMIN TOGGLE ===== -->
    <button class="admin-toggle" id="adminToggle" onclick="openDashboard()">
        <i class="fas fa-cog"></i> الإدارة
    </button>

    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard-wrapper" id="dashboardWrapper">
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1000015625-removebg-preview.png" alt="شعار" />
                <h2>ASSARU <span style="color:var(--primary-blue);">Academy</span></h2>
            </div>
            <div id="sidebarMenu"></div>
            <button class="logout-btn" onclick="logoutDashboard()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        </aside>
        <main class="dashboard-content" id="dashboardContent">
            <div id="pageContent"></div>
        </main>
    </div>

    <!-- ============================================================ -->
    <!--  جافا سكريبت – إصلاح شامل                                      -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // 1. FIREBASE CONFIG (في النطاق العام)
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCDrCtY7weMKAfWQq1k3Hx9hx1PPWa4XAE",
            authDomain: "academy-al.firebaseapp.com",
            databaseURL: "https://academy-al-default-rtdb.firebaseio.com",
            projectId: "academy-al",
            storageBucket: "academy-al.firebasestorage.app",
            messagingSenderId: "205174400637",
            appId: "1:205174400637:web:8d4312e8d70e5a194b3314"
        };
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase initialized');
        } catch (e) {
            console.error('❌ Firebase init error:', e);
        }
        const db = firebase.database();
        window.db = db; // جعله عاماً

        // ================================================================
        // 2. LOADING OVERLAY (عام)
        // ================================================================
        let isProcessing = false;
        window.isProcessing = isProcessing;

        function showLoading(msg) {
            document.getElementById('loadingMsg').textContent = msg || 'جاري التنفيذ...';
            document.getElementById('loadingOverlay').classList.add('active');
        }
        window.showLoading = showLoading;

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
            isProcessing = false;
            window.isProcessing = false;
        }
        window.hideLoading = hideLoading;

        // ================================================================
        // 3. متغيرات عامة + استماع مباشر
        // ================================================================
        let currentUser = null;
        let allPlayers = [];
        let allCoaches = [];
        let allTrainings = [];
        let allTournaments = [];
        let allMatches = [];
        let allAttendances = [];
        let allPayments = [];
        let allPlayerDetails = {};
        let allAttendanceArchive = [];
        const categories = ['U07', 'U09', 'U11', 'U13'];
        let currentViewFunction = null;
        let currentViewArgs = [];
        const MONTHS_AR = ['جانفي', 'فيفري', 'مارس', 'أبريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        const DAYS_AR = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

        function listenToAllData() {
            db.ref('academy/players').on('value', snap => {
                allPlayers = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/coaches').on('value', snap => {
                allCoaches = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/trainings').on('value', snap => {
                allTrainings = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/tournaments').on('value', snap => {
                allTournaments = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/matches').on('value', snap => {
                allMatches = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/attendances').on('value', snap => {
                allAttendances = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/payments').on('value', snap => {
                allPayments = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/playerDetails').on('value', snap => {
                allPlayerDetails = snap.val() || {};
                if (currentUser) refreshCurrentView();
            });
            db.ref('academy/attendanceArchive').on('value', snap => {
                allAttendanceArchive = snap.val() ? Object.keys(snap.val()).map(k => ({ id: k, ...snap.val()[k] })) : [];
                if (currentUser) refreshCurrentView();
            });
        }

        function refreshCurrentView() {
            if (currentViewFunction) {
                currentViewFunction(...currentViewArgs);
            }
        }
        window.refreshCurrentView = refreshCurrentView;

        // ================================================================
        // 4. دوال فتح/إغلاق اللوحة وتسجيل الدخول (عامة)
        // ================================================================
        window.openDashboard = function() {
            document.getElementById('dashboardWrapper').classList.add('active');
            showLoginScreen();
        };

        window.closeDashboard = function() {
            document.getElementById('dashboardWrapper').classList.remove('active');
            currentUser = null;
        };

        function showLoginScreen() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div style="max-width:500px; margin:60px auto; background:#fff; border-radius:24px; padding:40px; box-shadow:var(--shadow);">
                    <h2 style="text-align:center; font-size:2rem; color:var(--dark-navy);">🔐 تسجيل الدخول</h2>
                    <p style="text-align:center; color:#888; margin-bottom:24px;">أدخل الكود الخاص بك للدخول إلى لوحة التحكم</p>
                    <div class="form-group">
                        <label>الكود</label>
                        <input type="text" id="loginCode" placeholder="أدخل الكود ..." style="padding:12px; border-radius:12px; border:2px solid #ddd; width:100%;" />
                    </div>
                    <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
                        <button class="btn-submit" onclick="loginAs('admin')" style="flex:1;"><i class="fas fa-user-cog"></i> مدير</button>
                        <button class="btn-submit" onclick="loginAs('coach')" style="flex:1; background:linear-gradient(135deg,#28a745,#20c997);"><i class="fas fa-chalkboard-teacher"></i> مدرب</button>
                        <button class="btn-submit" onclick="loginAs('parent')" style="flex:1; background:linear-gradient(135deg,#ffc107,#e0a800); color:#212529;"><i class="fas fa-user-friends"></i> ولي أمر</button>
                    </div>
                    <div id="loginError" style="color:#e74c3c; margin-top:12px; text-align:center; display:none;">❌ كود غير صحيح</div>
                </div>
            `;
            document.getElementById('sidebarMenu').innerHTML = `
                <div class="menu-item" style="opacity:0.5; cursor:default;"><i class="fas fa-user"></i> <span>تسجيل الدخول</span></div>
            `;
        }

        window.loginAs = async function(role) {
            if (isProcessing) return;
            const code = document.getElementById('loginCode').value.trim();
            if (!code) { alert('الرجاء إدخال الكود'); return; }
            showLoading('جاري التحقق من الكود...');
            isProcessing = true;
            window.isProcessing = true;
            try {
                let user = null;
                if (role === 'admin') {
                    const snap = await db.ref('academy/admins/adminId').once('value');
                    const data = snap.val();
                    if (data && data.code === code) user = { role: 'admin', data, id: 'adminId' };
                } else if (role === 'coach') {
                    const snap = await db.ref('academy/coaches').orderByChild('code').equalTo(code).once('value');
                    if (snap.val()) {
                        const key = Object.keys(snap.val())[0];
                        user = { role: 'coach', data: snap.val()[key], id: key };
                    }
                } else if (role === 'parent') {
                    const snap = await db.ref('academy/players').orderByChild('parentCode').equalTo(code).once('value');
                    if (snap.val()) {
                        const key = Object.keys(snap.val())[0];
                        user = { role: 'parent', data: snap.val()[key], id: key };
                    }
                }
                if (user) {
                    currentUser = user;
                    document.getElementById('loginError').style.display = 'none';
                    if (!window._listenersStarted) {
                        listenToAllData();
                        window._listenersStarted = true;
                    }
                    renderDashboard();
                    hideLoading();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                    hideLoading();
                }
            } catch (e) {
                console.error(e);
                alert('خطأ في الاتصال بقاعدة البيانات');
                hideLoading();
            }
        };

        function renderDashboard() {
            const sidebar = document.getElementById('sidebarMenu');
            if (currentUser.role === 'admin') {
                sidebar.innerHTML = `
                    <div class="menu-item active" onclick="showAdminHome()"><i class="fas fa-tachometer-alt"></i> <span>الرئيسية</span></div>
                    <div class="menu-item" onclick="showAdminPlayers()"><i class="fas fa-users"></i> <span>اللاعبون</span></div>
                    <div class="menu-item" onclick="showAdminTrainings()"><i class="fas fa-futbol"></i> <span>التدريبات</span></div>
                    <div class="menu-item" onclick="showAdminTournaments()"><i class="fas fa-trophy"></i> <span>الدورات</span></div>
                    <div class="menu-item" onclick="showAdminMatches()"><i class="fas fa-handshake"></i> <span>المباريات</span></div>
                    <div class="menu-item" onclick="showAdminCoaches()"><i class="fas fa-chalkboard-teacher"></i> <span>المدربون</span></div>
                    <div class="menu-item" onclick="refreshDashboardData()" style="border-right-color:var(--gold);"><i class="fas fa-sync-alt"></i> <span>🔄 تحديث البيانات</span></div>
                `;
                showAdminHome();
            } else if (currentUser.role === 'coach') {
                sidebar.innerHTML = `
                    <div class="menu-item active" onclick="showCoachHome()"><i class="fas fa-tachometer-alt"></i> <span>الرئيسية</span></div>
                    <div class="menu-item" onclick="showCoachPlayers()"><i class="fas fa-users"></i> <span>لاعبي فئتي</span></div>
                    <div class="menu-item" onclick="showCoachTrainings()"><i class="fas fa-futbol"></i> <span>تدريباتي</span></div>
                    <div class="menu-item" onclick="refreshDashboardData()" style="border-right-color:var(--gold);"><i class="fas fa-sync-alt"></i> <span>🔄 تحديث البيانات</span></div>
                `;
                showCoachHome();
            } else if (currentUser.role === 'parent') {
                sidebar.innerHTML = `
                    <div class="menu-item active" onclick="showParentHome()"><i class="fas fa-user"></i> <span>حالة ابني</span></div>
                    <div class="menu-item" onclick="refreshDashboardData()" style="border-right-color:var(--gold);"><i class="fas fa-sync-alt"></i> <span>🔄 تحديث البيانات</span></div>
                `;
                showParentHome();
            }
        }

        window.refreshDashboardData = function() {
            if (isProcessing) return;
            showLoading('جاري تحديث البيانات...');
            isProcessing = true;
            window.isProcessing = true;
            setTimeout(() => {
                refreshCurrentView();
                hideLoading();
                alert('✅ تم تحديث البيانات بنجاح');
            }, 600);
        };

        // ================================================================
        // 5. دوال المدير (جميعها عامة)
        // ================================================================
        window.showAdminHome = function() {
            currentViewFunction = showAdminHome;
            currentViewArgs = [];
            const total = allPlayers.length,
                coaches = allCoaches.length,
                trainings = allTrainings.length,
                matches = allMatches.length,
                pending = allPlayers.filter(p => p.status === 'pending').length;
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <h2 class="page-title">🏠 لوحة المدير</h2>
                <p class="page-sub">مرحباً، لديك صلاحية كاملة.</p>
                <div class="stats-row">
                    <div class="stat-box"><div class="num">${total}</div><div class="label">اللاعبون</div></div>
                    <div class="stat-box"><div class="num">${coaches}</div><div class="label">المدربون</div></div>
                    <div class="stat-box"><div class="num">${trainings}</div><div class="label">تدريبات</div></div>
                    <div class="stat-box"><div class="num">${matches}</div><div class="label">مباريات</div></div>
                    <div class="stat-box"><div class="num" style="color:#f39c12;">${pending}</div><div class="label">طلبات pending</div></div>
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button class="btn-submit" onclick="showAdminPlayers()"><i class="fas fa-users"></i> اللاعبون</button>
                    <button class="btn-submit" onclick="showAdminTrainings()"><i class="fas fa-futbol"></i> التدريبات</button>
                    <button class="btn-submit" onclick="showAdminTournaments()"><i class="fas fa-trophy"></i> الدورات</button>
                    <button class="btn-submit" onclick="showAdminMatches()"><i class="fas fa-handshake"></i> المباريات</button>
                </div>
            `;
            setActiveMenu(0);
        };

        // ---- إدارة اللاعبين ----
        window.showAdminPlayers = function() {
            currentViewFunction = showAdminPlayers;
            currentViewArgs = [];
            const content = document.getElementById('pageContent');
            let html = `<h2 class="page-title">👥 اللاعبون</h2><p class="page-sub">إدارة جميع اللاعبين حسب الفئات</p>`;
            html += `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">`;
            categories.forEach(cat => {
                html += `<button class="btn-sm btn-sm-primary" onclick="filterPlayers('${cat}')">${cat}</button>`;
            });
            html += `<button class="btn-sm btn-sm-warning" onclick="filterPlayers('all')">الكل</button></div>`;
            html += `<div class="table-wrap"><table>
                <thead><tr><th>#</th><th>الصورة</th><th>الاسم</th><th>الفئة</th><th>الولي</th><th>الحالة</th><th>الحضور</th><th>الدفع</th><th>التقييم</th><th>إجراءات</th></tr></thead>
                <tbody id="playersTableBody"></tbody>
            </table></div>`;
            html += `
                <div class="form-card">
                    <h3>➕ إضافة لاعب جديد</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>الاسم</label><input type="text" id="newFirstName" /></div>
                        <div class="form-group"><label>اللقب</label><input type="text" id="newLastName" /></div>
                        <div class="form-group"><label>الفئة</label><select id="newCategory">${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
                        <div class="form-group"><label>تاريخ الميلاد</label><input type="date" id="newBirthDate" /></div>
                        <div class="form-group"><label>الولي</label><input type="text" id="newGuardian" /></div>
                        <div class="form-group"><label>هاتف الولي</label><input type="text" id="newGuardianPhone" /></div>
                        <div class="form-group full"><button class="btn-submit" onclick="addPlayer()"><i class="fas fa-save"></i> حفظ</button></div>
                    </div>
                </div>
            `;
            content.innerHTML = html;
            setActiveMenu(1);
            renderPlayersTable('all');
        };

        function renderPlayersTable(filterCategory) {
            const tbody = document.getElementById('playersTableBody');
            if (!tbody) return;
            let players = allPlayers;
            if (filterCategory !== 'all') players = players.filter(p => p.categoryId === filterCategory);
            if (players.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#888;padding:20px;">لا يوجد لاعبون</td></tr>`;
                return;
            }
            let html = '';
            players.forEach((p, idx) => {
                const weekAtt = allAttendances.filter(a => a.playerId === p.id && isThisWeek(a.date));
                const present = weekAtt.filter(a => a.status === 'present').length;
                const absent = weekAtt.filter(a => a.status === 'absent').length;
                const payment = allPayments.find(pay => pay.playerId === p.id);
                const payStatus = payment ? payment.status : 'unpaid';
                const expiry = payment ? payment.expiryDate : '-';
                const rating = allPlayerDetails[p.id] ? allPlayerDetails[p.id].rating : '-';
                const imgSrc = p.photo && p.photo.startsWith('data:image') ? p.photo : 'https://via.placeholder.com/50';

                let statusHtml = `<span class="badge-status ${p.status==='approved'?'paid':p.status==='rejected'?'unpaid':'unpaid'}">${p.status==='approved'?'معتمد':p.status==='rejected'?'مرفوض':'قيد الانتظار'}</span>`;
                if (p.status === 'pending') {
                    statusHtml += `
                        <div style="margin-top:4px;">
                            <button class="btn-sm btn-sm-success" onclick="approvePlayer('${p.id}')">قبول</button>
                            <button class="btn-sm btn-sm-danger" onclick="rejectPlayer('${p.id}')">رفض</button>
                        </div>
                    `;
                }

                html += `<tr>
                    <td>${idx+1}</td>
                    <td><img src="${imgSrc}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid var(--primary-blue);" /></td>
                    <td>${p.firstName||''} ${p.lastName||''}</td>
                    <td><strong>${p.categoryId||''}</strong></td>
                    <td>${p.guardianName||''}</td>
                    <td>${statusHtml}</td>
                    <td><span class="badge-status ${present>absent?'present':'absent'}">ح:${present} / غ:${absent}</span></td>
                    <td><span class="badge-status ${payStatus==='paid'?'paid':'unpaid'}">${payStatus==='paid'?'مدفوع':'غير مدفوع'} (${expiry})</span></td>
                    <td>${rating}</td>
                    <td>
                        <button class="btn-sm btn-sm-info" onclick="showPlayerDetails('${p.id}')"><i class="fas fa-eye"></i></button>
                        <button class="btn-sm btn-sm-danger" onclick="deletePlayer('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        window.approvePlayer = function(id) {
            if (isProcessing) return;
            if (!confirm('قبول هذا اللاعب؟')) return;
            showLoading('جاري قبول اللاعب...');
            isProcessing = true;
            window.isProcessing = true;
            db.ref('academy/players/' + id).update({ status: 'approved' })
                .then(() => { hideLoading();
                    alert('✅ تم قبول اللاعب'); })
                .catch(err => { hideLoading();
                    alert('❌ خطأ: ' + err.message); });
        };

        window.rejectPlayer = function(id) {
            if (isProcessing) return;
            if (!confirm('رفض هذا اللاعب؟')) return;
            showLoading('جاري رفض اللاعب...');
            isProcessing = true;
            window.isProcessing = true;
            db.ref('academy/players/' + id).update({ status: 'rejected' })
                .then(() => { hideLoading();
                    alert('✅ تم رفض اللاعب'); })
                .catch(err => { hideLoading();
                    alert('❌ خطأ: ' + err.message); });
        };

        window.addPlayer = function() {
            if (isProcessing) return;
            const firstName = document.getElementById('newFirstName').value.trim();
            const lastName = document.getElementById('newLastName').value.trim();
            const categoryId = document.getElementById('newCategory').value;
            const birthDate = document.getElementById('newBirthDate').value;
            const guardianName = document.getElementById('newGuardian').value.trim();
            const guardianPhone = document.getElementById('newGuardianPhone').value.trim();
            if (!firstName || !lastName || !categoryId || !birthDate || !guardianName || !guardianPhone) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }
            showLoading('جاري إضافة اللاعب...');
            isProcessing = true;
            window.isProcessing = true;
            const parentCode = `${firstName}${lastName}${categoryId}${new Date(birthDate).getFullYear()}`;
            const newPlayer = { firstName, lastName, categoryId, birthDate, guardianName, guardianPhone, parentCode,
                status: 'approved', registrationDate: new Date().toISOString() };
            db.ref('academy/players').push(newPlayer)
                .then(() => { hideLoading();
                    alert('✅ تم إضافة اللاعب');
                    document.getElementById('newFirstName').value = '';
                    document.getElementById('newLastName').value = '';
                    document.getElementById('newBirthDate').value = '';

        window.archiveCurrentWeek = function(playerId) {
            if (isProcessing) return;
            if (!confirm('أرشفة هذا الأسبوع للاعب؟ سيتم نقل البيانات إلى الأرشيف.')) return;
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            const weekData = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const att = allAttendances.find(a => a.playerId === playerId && a.date === dateStr);
                if (att) {
                    weekData.push({ date: dateStr, status: att.status });
                    db.ref('academy/attendances/' + att.id).remove();
                }
            }
            if (weekData.length === 0) { alert('لا توجد بيانات لهذا الأسبوع'); return; }
            showLoading('جاري الأرشفة...');
            isProcessing = true;
            window.isProcessing = true;
            const archiveData = {
                playerId,
                weekStart: startOfWeek.toISOString().split('T')[0],
                data: weekData,
                timestamp: Date.now()
            };
            db.ref('academy/attendanceArchive').push(archiveData)
                .then(() => { hideLoading();
                    alert('✅ تم أرشفة الأسبوع');
                    closeModal();
                    showPlayerDetails(playerId); })
                .catch(err => { hideLoading();
                    alert('❌ خطأ: ' + err.message); });
        };

        function isThisWeek(dateStr) {
            const today = new Date();
            const d = new Date(dateStr);
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            return d >= startOfWeek && d <= endOfWeek;
        }

        };

        // ================================================================
        // 11. تهيئة البيانات الأولية
        // ================================================================
        function initDatabase() {
            db.ref('academy/admins/adminId').once('value').then(snap => {
                if (!snap.exists()) {
                    db.ref('academy/admins/adminId').set({ code: 'assaru22', name: 'المدير العام' });
                }
            });
            categories.forEach(cat => {
                db.ref('academy/categories/' + cat).once('value').then(snap => {
                    if (!snap.exists()) {
                        db.ref('academy/categories/' + cat).set({ name: cat, ageGroup: '' });
                    }
                });
            });
        }
        initDatabase();

        // ================================================================
        // 12. استمارة التسجيل
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    if (isProcessing) return;
                    const firstName = document.getElementById('regFirstName').value.trim();
                    const lastName = document.getElementById('regLastName').value.trim();
                    const category = document.getElementById('regCategory').value;
                    const birthDate = document.getElementById('regBirthDate').value;
                    const birthPlace = document.getElementById('regBirthPlace').value.trim();
                    const studyLevel = document.getElementById('regStudyLevel').value.trim();
                    const health = document.getElementById('regHealth').value.trim();
                    const bloodType = document.getElementById('regBloodType').value.trim();
                    const guardianName = document.getElementById('regGuardianName').value.trim();
                    const guardianPhone = document.getElementById('regGuardianPhone').value.trim();
                    if (!firstName || !lastName || !category || !birthDate || !birthPlace || !studyLevel || !
                        guardianName || !guardianPhone) {
                        alert('❌ الرجاء ملء جميع الحقول الإجبارية');
                        return;
                    }
                    const photoFile = document.getElementById('regPhoto').files[0];
                    const parentalFile = document.getElementById('regParental').files[0];
                    const internalFile = document.getElementById('regInternal').files[0];
                    if (!photoFile || !parentalFile || !internalFile) {
                        alert('❌ الرجاء رفع جميع الصور المطلوبة');
                        return;
                    }
                    showLoading('جاري التسجيل في أكاديمية ASSARU...');
                    isProcessing = true;
                    window.isProcessing = true;
                    try {
                        const photoData = await readFileAsBase64(photoFile);
                        const parentalData = await readFileAsBase64(parentalFile);
                        const internalData = await readFileAsBase64(internalFile);
                        const parentCode =
                            `${firstName}${lastName}${category}${new Date(birthDate).getFullYear()}`;
                        const newPlayer = {
                            firstName,
                            lastName,
                            categoryId: category,
                            birthDate,
                            birthPlace,
                            studyLevel,
                            health: health || 'سليم',
                            bloodType: bloodType || 'غير محدد',
                            guardianName,
                            guardianPhone,
                            parentCode,
                            status: 'pending',
                            registrationDate: new Date().toISOString(),
                            photo: photoData,
                            parentalDoc: parentalData,
                            internalDoc: internalData
                        };
                        await db.ref('academy/players').push(newPlayer);
                        hideLoading();
                        document.getElementById('confirmInfo').innerHTML = `
                            <p><strong>الاسم:</strong> ${firstName}</p>
                            <p><strong>اللقب:</strong> ${lastName}</p>
                            <p><strong>الفئة:</strong> ${category}</p>
                            <p><strong>تاريخ الميلاد:</strong> ${birthDate}</p>
                            <p><strong>كود ولي الأمر:</strong> <strong style="color:#45B3FF;">${parentCode}</strong></p>
                            <p style="color:#e74c3c; font-size:0.85rem;">احتفظ بهذا الكود للدخول إلى لوحة ولي الأمر</p>
                        `;
                        document.getElementById('confirmPopup').classList.add('active');
                        form.reset();
                        document.querySelectorAll('.upload-area').forEach(el => el.classList.remove('has-file'));
                        document.querySelectorAll('.file-name').forEach(el => el.textContent = '');
                    } catch (error) {
                        console.error(error);
                        hideLoading();
                        alert('❌ حدث خطأ أثناء التسجيل، حاول مرة أخرى.');
                    }
                });
            }

            // ---- إعداد رفع الملفات ----
            function setupUpload(inputId, nameDisplayId, containerId) {
                const input = document.getElementById(inputId);
                const nameDisplay = document.getElementById(nameDisplayId);
                const container = document.getElementById(containerId);
                if (input && nameDisplay && container) {
                    input.addEventListener('change', function() {
                        const file = this.files[0];
                        if (file) { nameDisplay.textContent = '✅ ' + file.name;
                            container.classList.add('has-file'); } else { nameDisplay.textContent = '';
                            container.classList.remove('has-file'); }
                    });
                }
            }
            setupUpload('regPhoto', 'photoFileName', 'uploadPhoto');
            setupUpload('regParental', 'parentalFileName', 'uploadParental');
            setupUpload('regInternal', 'internalFileName', 'uploadInternal');

            // ---- Gallery ----
            const galleryImages = [
                { id: 1, title: 'لاعبو الأكاديمية', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1782370717656.jpg' },
                { id: 2, title: 'تدريبات الفريق', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1782370875709.jpg' },
                { id: 3, title: 'مباراة ودية', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1782370958563.jpg' },
                { id: 4, title: 'فريق الأكاديمية', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/1782371149037.jpg' },
                { id: 5, title: 'الطقم الرسمي', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/file_00000000d8b87243ba967177f2617619.png' },
                { id: 6, title: 'صورة هيدروبطولية', url: 'https://raw.githubusercontent.com/darkonovic51-hash/Mohamed-test/4a065c0a8a951b1d39707aa5eb90a5ce7512bec4/file_00000000f604724381e69917b7f6b263.png' }
            ];

            function renderGallery() {
                const container = document.getElementById('galleryGrid');
                if (!container) return;
                container.innerHTML = '';
                galleryImages.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML =
                        `<img src="${item.url}" alt="${item.title}" loading="lazy" /><div class="overlay"><span>${item.title}</span></div>`;
                    container.appendChild(div);
                });
            }
            renderGallery();

            // ---- Navbar scroll ----
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => { navbar.classList.toggle('scrolled', window.scrollY > 60); });

            // ---- Mobile menu ----
            document.getElementById('menuBtn').addEventListener('click', () => { document.getElementById('navLinks')
                    .classList.toggle('show'); });

            // ---- Smooth scroll ----
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        document.getElementById('navLinks').classList.remove('show'); }
                });
            });

            // ---- Dynamic text ----
            const words = ['الرائد', 'النخبة', 'الأبطال', 'المستقبل'];
            let wordIndex = 0,
                charIndex = 0,
                isDeleting = false;
            const dynamicText = document.getElementById('dynamicText');

            function typeEffect() {
                const currentWord = words[wordIndex];
                if (isDeleting) { dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                    charIndex--; } else { dynamicText.textContent = currentWord.substring(0, charIndex + 1);
                    charIndex++; }
                if (!isDeleting && charIndex === currentWord.length) { isDeleting = true;
                    setTimeout(typeEffect, 2000); } else if (isDeleting && charIndex === 0) { isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    setTimeout(typeEffect, 300); } else { setTimeout(typeEffect, isDeleting ? 50 : 120); }
            }
            typeEffect();

            // ---- Close popup on overlay click ----
            document.getElementById('confirmPopup').addEventListener('click', function(e) { if (e.target === this)
                    closeConfirmPopup(); });
        });

        function closeConfirmPopup() {
            document.getElementById('confirmPopup').classList.remove('active');
        }
        window.closeConfirmPopup = closeConfirmPopup;

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        console.log('✅ النظام المتكامل جاهز مع جميع التعديلات');
    </script>
</body>
</html>
