<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { color: #041A38; margin-bottom: 10px; }
        p { color: #6B7A8F; margin-bottom: 20px; }
        button {
            background: #45B3FF;
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2196F3; transform: translateY(-2px); }
        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e0e0e0;
            font-size: 0.95rem;
            text-align: right;
            min-height: 60px;
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .warning { color: #f39c12; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 اختبار Firebase</h1>
        <p>هذا الكود يختبر الاتصال بقاعدة البيانات ويعرض النتيجة.</p>
        <button onclick="testFirebase()">🚀 اختبار الاتصال</button>
        <div id="result">اضغط على الزر لبدء الاختبار.</div>
    </div>

    <script>
        // ===== إعدادات Firebase (نفس التي تستخدمها) =====
        const firebaseConfig = {
            apiKey: "AIzaSyCDrCtY7weMKAfWQq1k3Hx9hx1PPWa4XAE",
            authDomain: "academy-al.firebaseapp.com",
            databaseURL: "https://academy-al-default-rtdb.firebaseio.com",
            projectId: "academy-al",
            storageBucket: "academy-al.firebasestorage.app",
            messagingSenderId: "205174400637",
            appId: "1:205174400637:web:8d4312e8d70e5a194b3314"
        };

        // تهيئة Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase initialized');
        } catch (e) {
            console.error('❌ Firebase init error:', e);
            document.getElementById('result').innerHTML = '<span class="error">❌ فشل تهيئة Firebase: ' + e.message + '</span>';
        }

        const database = firebase.database();

        function testFirebase() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ جاري الاتصال بقاعدة البيانات...';

            // محاولة قراءة البيانات من العقدة الرئيسية
            database.ref('academyData').once('value')
                .then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // عرض ملخص للبيانات
                        const keys = Object.keys(data);
                        const summary = keys.map(key => `${key}: ${Array.isArray(data[key]) ? data[key].length : 'موجود'}`).join('، ');
                        resultDiv.innerHTML = `
                            <span class="success">✅ الاتصال ناجح!</span><br>
                            <strong>البيانات الموجودة:</strong><br>
                            ${summary}<br>
                            <span style="font-size:0.8rem;color:#888;">(تفاصيل أكثر في وحدة التحكم Console)</span>
                        `;
                        console.log('📦 البيانات كاملة:', data);
                    } else {
                        resultDiv.innerHTML = '<span class="warning">⚠️ الاتصال ناجح، ولكن لا توجد بيانات في `academyData`.</span>';
                    }
                })
                .catch((err) => {
                    console.error('❌ خطأ في القراءة:', err);
                    resultDiv.innerHTML = `<span class="error">❌ فشل القراءة: ${err.message}</span>`;
                });
        }
    </script>
</body>
</html>
