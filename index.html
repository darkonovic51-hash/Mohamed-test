<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>ASSARU Academy – نظام الإدارة المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #00B4D8;
            --primary-dark: #0077B6;
            --secondary: #90E0EF;
            --accent: #FFD60A;
            --dark: #03045E;
            --dark-card: #0A1A2F;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0B132B;
            color: #E8EDF5;
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ===== LOADING ===== */
        .app-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0B132B;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .app-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .app-loader .logo {
            width: 100px;
            height: auto;
            animation: pulseLogo 1.5s ease-in-out infinite;
        }
        .app-loader .spinner {
            margin-top: 24px;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 180, 216, 0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .app-loader p {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 600;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes pulseLogo {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            direction: rtl;
        }
        .toast {
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.4s ease;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 200px;
        }
        .toast-success {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border-color: rgba(46, 213, 115, 0.3);
        }
        .toast-error {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border-color: rgba(255, 71, 87, 0.3);
        }
        .toast-info {
            background: rgba(0, 180, 216, 0.2);
            color: var(--secondary);
            border-color: rgba(0, 180, 216, 0.3);
        }
        .toast-warning {
            background: rgba(255, 214, 10, 0.15);
            color: var(--accent);
            border-color: rgba(255, 214, 10, 0.25);
        }
        @keyframes toastIn {
            0% {
                opacity: 0;
                transform: translateX(40px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 30% 20%, #0A1A3A, #03045E);
            position: relative;
            overflow: hidden;
        }
        .login-screen::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 70%;
            height: 120%;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-screen::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 60%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 214, 10, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 2;
        }
        .login-box .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-box .brand img {
            height: 60px;
            width: auto;
            margin-bottom: 8px;
        }
        .login-box .brand h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
        }
        .login-box .brand h1 span {
            color: var(--primary);
        }
        .login-box .brand p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-top: 2px;
        }
        .login-box .form-group {
            margin-bottom: 16px;
        }
        .login-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
        }
        .login-box .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 180, 216, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }
        .login-box .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        .login-box .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }
        .login-box .role-btn {
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        .login-box .role-btn i {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .login-box .role-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .login-box .role-btn.active {
            background: rgba(0, 180, 216, 0.15);
            border-color: var(--primary);
            color: var(--primary);
        }
        .login-box .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-box .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 180, 216, 0.3);
        }
        .login-box .login-btn:active {
            transform: scale(0.98);
        }
        .login-box .login-error {
            color: #ff4757;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .login-box .login-error.show {
            display: block;
        }
        .login-box .login-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ===== DASHBOARD LAYOUT ===== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background: #0B132B;
        }
        .dashboard.active {
            display: flex;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 270px;
            min-height: 100vh;
            background: rgba(10, 26, 47, 0.92);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.04);
            padding: 24px 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .sidebar .brand {
            padding: 0 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .sidebar .brand img {
            height: 44px;
            width: auto;
        }
        .sidebar .brand h2 {
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
        }
        .sidebar .brand h2 span {
            color: var(--primary);
        }
        .sidebar .nav {
            flex: 1;
            padding: 16px 12px 0;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2px;
            border: none;
            background: transparent;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            text-align: right;
        }
        .sidebar .nav-item i {
            width: 22px;
            font-size: 1.1rem;
            text-align: center;
            flex-shrink: 0;
        }
        .sidebar .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }
        .sidebar .nav-item.active {
            background: rgba(0, 180, 216, 0.12);
            color: var(--primary);
            box-shadow: inset 3px 0 0 var(--primary);
        }
        .sidebar .nav-item .badge {
            margin-right: auto;
            background: rgba(255, 214, 10, 0.15);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 700;
        }
        .sidebar .user-info {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar .user-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar .user-info .name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
        }
        .sidebar .user-info .role {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.35);
        }
        .sidebar .user-info .logout-btn {
            margin-right: auto;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 4px 8px;
            border-radius: 8px;
        }
        .sidebar .user-info .logout-btn:hover {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        /* ---- Main Content ---- */
        .main {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            max-height: 100vh;
        }
        .main .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .main .page-header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
        }
        .main .page-header h1 span {
            color: var(--primary);
        }
        .main .page-header .sub {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        /* ---- Cards ---- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            padding: 20px 22px;
            transition: var(--transition);
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        .stat-card .icon {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
        }
        .stat-card .label {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ---- Tables ---- */
        .table-wrap {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            overflow: auto;
            margin-bottom: 20px;
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 700px;
        }
        .table-wrap th {
            padding: 14px 14px;
            text-align: center;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-wrap td {
            padding: 12px 14px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.8);
            vertical-align: middle;
        }
        .table-wrap tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .table-wrap .avatar-sm {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 180, 216, 0.3);
        }

        /* ---- Badges ---- */
        .badge-status {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-status.approved,
        .badge-status.paid,
        .badge-status.present {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
        }
        .badge-status.pending,
        .badge-status.unpaid,
        .badge-status.absent {
            background: rgba(255, 71, 87, 0.12);
            color: #ff4757;
        }
        .badge-status.excused {
            background: rgba(255, 214, 10, 0.12);
            color: var(--accent);
        }
        .badge-status.completed {
            background: rgba(0, 180, 216, 0.15);
            color: var(--secondary);
        }

        /* ---- Buttons ---- */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 180, 216, 0.25);
        }
        .btn-success {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
        }
        .btn-success:hover {
            background: rgba(46, 213, 115, 0.25);
        }
        .btn-danger {
            background: rgba(255, 71, 87, 0.12);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.15);
        }
        .btn-danger:hover {
            background: rgba(255, 71, 87, 0.2);
        }
        .btn-warning {
            background: rgba(255, 214, 10, 0.1);
            color: var(--accent);
            border: 1px solid rgba(255, 214, 10, 0.15);
        }
        .btn-warning:hover {
            background: rgba(255, 214, 10, 0.2);
        }
        .btn-info {
            background: rgba(0, 180, 216, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(0, 180, 216, 0.15);
        }
        .btn-info:hover {
            background: rgba(0, 180, 216, 0.2);
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.7rem;
        }
        .btn-ghost {
            background: transparent;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        /* ---- Forms ---- */
        .form-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-card h3 {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
        }
        .form-card h3 i {
            color: var(--primary);
            margin-left: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
        }
        .form-grid .full {
            grid-column: 1 / -1;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 180, 216, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .form-group select option {
            background: #0B132B;
            color: #fff;
        }
        .upload-area {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.02);
        }
        .upload-area:hover {
            border-color: rgba(0, 180, 216, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }
        .upload-area.has-file {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.05);
        }
        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-area .icon {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.2);
        }
        .upload-area .text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 2px;
        }
        .upload-area .file-name {
            font-size: 0.75rem;
            color: #2ed573;
            margin-top: 4px;
            display: none;
        }
        .upload-area.has-file .file-name {
            display: block;
        }
        .upload-area.has-file .text {
            display: none;
        }

        /* ---- Player Detail Page ---- */
        .player-detail {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            padding: 28px 30px;
        }
        .player-detail .header {
            display: flex;
            align-items: center;
            gap: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .player-detail .header .avatar {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            overflow: hidden;

    <script>
        // ================================================================
        // 0. DEBUG & HELPERS
        // ================================================================
        const DEBUG = false;

        function log(msg, type = 'info') {
            if (DEBUG) console.log(`[${type.toUpperCase()}]`, msg);
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(40px)';
                setTimeout(() => toast.remove(), 400);
            }, 2800);
        }

        function showLoader(show = true) {
            const el = document.getElementById('appLoader');
            if (show) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        // ================================================================
        // 1. FIREBASE
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCDrCtY7weMKAfWQq1k3Hx9hx1PPWa4XAE",
            authDomain: "academy-al.firebaseapp.com",
            databaseURL: "https://academy-al-default-rtdb.firebaseio.com",
            projectId: "academy-al",
            storageBucket: "academy-al.firebasestorage.app",
            messagingSenderId: "205174400637",
            appId: "1:205174400637:web:8d4312e8d70e5a194b3314"
        };
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            log('🔥 Firebase متصل');
        } catch (e) {
            console.error('❌ Firebase init error:', e);
            showToast('فشل الاتصال بقاعدة البيانات', 'error');
        }

        // ================================================================
        // 2. DATA STORE
        // ================================================================
        let DATA = {
            players: [],
            coaches: [],
            trainingSessions: [],
            tournaments: [],
            matches: [],
            attendances: [],
            payments: [],
            playerDetails: {},
            logs: []
        };
        let currentUser = null;
        let currentView = 'home';
        let previousView = null;

        // ================================================================
        // 3. LOAD DATA (سريع وبدون مؤشرات تحديث)
        // ================================================================
        function loadAllData() {
            return new Promise((resolve, reject) => {
                if (!db) { reject('Firebase غير متصل'); return; }
                const paths = [
                    'academy/players', 'academy/coaches', 'academy/trainingSessions',
                    'academy/tournaments', 'academy/matches', 'academy/attendances',
                    'academy/payments', 'academy/playerDetails', 'academy/logs'
                ];
                const promises = paths.map(p => db.ref(p).once('value'));
                Promise.all(promises)
                    .then(results => {
                        DATA.players = results[0].val() ? Object.keys(results[0].val()).map(k => ({ id: k,
                                ...results[0].val()[k] })) : [];
                        DATA.coaches = results[1].val() ? Object.keys(results[1].val()).map(k => ({ id: k,
                                ...results[1].val()[k] })) : [];
                        DATA.trainingSessions = results[2].val() ? Object.keys(results[2].val()).map(k => ({ id: k,
                                ...results[2].val()[k] })) : [];
                        DATA.tournaments = results[3].val() ? Object.keys(results[3].val()).map(k => ({ id: k,
                                ...results[3].val()[k] })) : [];
                        DATA.matches = results[4].val() ? Object.keys(results[4].val()).map(k => ({ id: k,
                                ...results[4].val()[k] })) : [];
                        DATA.attendances = results[5].val() ? Object.keys(results[5].val()).map(k => ({ id: k,
                                ...results[5].val()[k] })) : [];
                        DATA.payments = results[6].val() ? Object.keys(results[6].val()).map(k => ({ id: k,
                                ...results[6].val()[k] })) : [];
                        DATA.playerDetails = results[7].val() || {};
                        DATA.logs = results[8].val() ? Object.keys(results[8].val()).map(k => ({ id: k,
                                ...results[8].val()[k] })) : [];
                        log(`✅ تم تحميل ${DATA.players.length} لاعب، ${DATA.coaches.length} مدرب`);
                        resolve();
                    })
                    .catch(err => { console.error(err);
                        reject(err); });
            });

        // ================================================================
        // 4. AUTH (كلمات السر الجديدة)
        // ================================================================
        const ADMIN_CODE = 'assaru22';
        const COACH_CODE = 'Coach-v5uc';

        function generateParentCode(player) {
            // الاسم كاملا + الفئة + عام الميلاد
            const name = `${player.firstName || ''} ${player.lastName || ''}`.trim();
            const category = player.categoryId || '';
            const year = player.birthDate ? new Date(player.birthDate).getFullYear() : '';
            return `${name} ${category} ${year}`.trim();
        }

        function verifyLogin(code, role) {
            if (role === 'admin') {
                return code === ADMIN_CODE;
            }
            if (role === 'coach') {
                return code === COACH_CODE;
            }
            if (role === 'parent') {
                // نبحث عن لاعب له نفس الكود
                const player = DATA.players.find(p => generateParentCode(p) === code);
                return player ? player : null;
            }
            return false;
        }

        function getPlayerByParentCode(code) {
            return DATA.players.find(p => generateParentCode(p) === code);
        }

        // ================================================================
        // 5. LOGIN / LOGOUT
        // ================================================================
        let selectedRole = 'admin';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
            document.getElementById('loginError').classList.remove('show');
        }

        async function handleLogin() {
            const codeInput = document.getElementById('loginCode');
            const code = codeInput.value.trim();
            if (!code) { showToast('الرجاء إدخال الكود', 'warning'); return; }

            showLoader(true);
            try {
                // نضمن تحميل البيانات أولاً
                await loadAllData();

                const result = verifyLogin(code, selectedRole);
                if (result === false) {
                    document.getElementById('loginError').classList.add('show');
                    showLoader(false);
                    return;
                }

                // بناء كائن المستخدم
                if (selectedRole === 'admin') {
                    currentUser = { role: 'admin', name: 'المدير', id: 'admin' };
                } else if (selectedRole === 'coach') {
                    const coach = DATA.coaches.find(c => c.code === code);
                    currentUser = {
                        role: 'coach',
                        name: coach?.name || 'مدرب',
                        id: coach?.id || 'coach',
                        data: coach || {}
                    };
                } else if (selectedRole === 'parent') {
                    const player = result;
                    currentUser = {
                        role: 'parent',
                        name: player?.firstName + ' ' + player?.lastName || 'ولي أمر',
                        id: player?.id || 'parent',
                        data: player || {}
                    };
                }

                // إخفاء شاشة الدخول وإظهار لوحة التحكم
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                showLoader(false);

                // تهيئة الواجهة
                initDashboard();
                showToast(`مرحباً ${currentUser.name}`, 'success');
                log(`✅ تسجيل دخول: ${currentUser.role} - ${currentUser.name}`);

            } catch (e) {
                console.error(e);
                showToast('خطأ في الاتصال بقاعدة البيانات', 'error');
                showLoader(false);
            }
        }

        function handleLogout() {
            if (!confirm('تسجيل الخروج؟')) return;
            currentUser = null;
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginCode').value = '';
            document.getElementById('loginError').classList.remove('show');
            showToast('تم تسجيل الخروج', 'info');
        }

        function navigateTo(view, params = null) {
            previousView = currentView;
            currentView = view;

            // تحديث القائمة النشطة
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.view === view);
            });

            // إغلاق السايدبار في الجوال
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }

            // عرض الصفحة المناسبة
            const handlers = {
                home: renderHome,
                players: renderPlayers,
                sessions: renderSessions,
                matches: renderMatches,
                tournaments: renderTournaments,
                coaches: renderCoaches,
                logs: renderLogs,
                'my-players': renderMyPlayers,
                'my-sessions': renderMySessions,
                'my-matches': renderMyMatches,
            };

            const handler = handlers[view] || renderHome;
            handler(params);
        }

            const sidebar = document.getElementById('sidebar');

            const search = document.getElementById('playerSearch')?.value?.toLowerCase() || '';

            if (search) {

                    (p.firstName?.toLowerCase().includes(search) ||
                        p.lastName?.toLowerCase().includes(search) ||
                        (p.firstName + ' ' + p.lastName)?.toLowerCase().includes(search))
                );
            }
            renderPlayersTable(filtered);

        // ---- 9.1 Player Actions ----
        function approvePlayer(id) {
            if (!confirm('قبول هذا اللاعب؟')) return;
            db.ref('academy/players/' + id).update({ status: 'approved' })
                .then(() => {
                    const p = DATA.players.find(x => x.id === id);
                    if (p) p.status = 'approved';
                    showToast('✅ تم قبول اللاعب', 'success');
                    addLog('قبول لاعب', `تم قبول اللاعب ${p?.firstName || ''} ${p?.lastName || ''}`);
                    filterPlayers();
                })
                .catch(() => showToast('خطأ في القبول', 'error'));
        }

        function rejectPlayer(id) {
            if (!confirm('رفض هذا اللاعب؟')) return;
            db.ref('academy/players/' + id).update({ status: 'rejected' })
                .then(() => {
                    const p = DATA.players.find(x => x.id === id);
                    if (p) p.status = 'rejected';
                    showToast('✅ تم رفض اللاعب', 'success');
                    addLog('رفض لاعب', `تم رفض اللاعب ${p?.firstName || ''} ${p?.lastName || ''}`);
                    filterPlayers();
                })
                .catch(() => showToast('خطأ في الرفض', 'error'));
        }

        function deletePlayer(id) {
            if (!confirm('حذف هذا اللاعب نهائياً؟')) return;
            db.ref('academy/players/' + id).remove()
                .then(() => {
                    DATA.players = DATA.players.filter(p => p.id !== id);
                    showToast('✅ تم حذف اللاعب', 'success');
                    addLog('حذف لاعب', `تم حذف لاعب`);
                    filterPlayers();
                })
                .catch(() => showToast('خطأ في الحذف', 'error'));
        }

        function saveNewPlayer() {
            const firstName = document.getElementById('newFirstName').value.trim();
            const lastName = document.getElementById('newLastName').value.trim();
            const categoryId = document.getElementById('newCategory').value;
            const birthDate = document.getElementById('newBirthDate').value;
            const guardianName = document.getElementById('newGuardian').value.trim();
            const guardianPhone = document.getElementById('newGuardianPhone').value.trim();
            const jerseyNumber = parseInt(document.getElementById('newJerseyNumber').value) || 0;
            const position = document.getElementById('newPosition').value;

            if (!firstName || !lastName || !categoryId || !birthDate || !guardianName || !guardianPhone) {
                showToast('الرجاء ملء جميع الحقول الإجبارية', 'warning');
                return;
            }

            const photoFile = document.getElementById('newPhoto').files[0];
            const processSave = (photoData) => {
                const parentCode = `${firstName}${lastName}${categoryId}${new Date(birthDate).getFullYear()}`;
                const player = {
                    firstName,
                    lastName,
                    categoryId,
                    birthDate,
                    guardianName,
                    guardianPhone,
                    parentCode,
                    status: 'approved',
                    registrationDate: new Date().toISOString(),
                    photo: photoData || ''
                };
                db.ref('academy/players').push(player)
                    .then(snap => {
                        const id = snap.key;
                        db.ref('academy/playerDetails/' + id).set({
                            jerseyNumber,
                            position,
                            fitness: 80,
                            goals: 0,
                            assists: 0,
                            yellowCards: 0,
                            redCards: 0,
                            manOfMatch: 0,
                            starterMatches: 0
                        });
                        DATA.players.push({ id, ...player });
                        if (!DATA.playerDetails[id]) DATA.playerDetails[id] = {};
                        DATA.playerDetails[id].jerseyNumber = jerseyNumber;
                        DATA.playerDetails[id].position = position;
                        showToast('✅ تم إضافة اللاعب', 'success');
                        addLog('إضافة لاعب', `تم إضافة اللاعب ${firstName} ${lastName}`);
                        closeModal('addPlayerModal');
                        filterPlayers();
                    })
                    .catch(() => showToast('خطأ في الحفظ', 'error'));
            };

            if (photoFile) {
                const reader = new FileReader();
                reader.onload = e => processSave(e.target.result);
                reader.readAsDataURL(photoFile);
            } else {
                processSave(null);
            }
        }

        // ---- 9.2 Edit Fields ----
        function editField(playerId, field, current, label) {
            const newVal = prompt(`تعديل ${label}`, current);
            if (newVal === null || newVal === current) return;

            const isPlayer = ['categoryId', 'birthDate', 'birthPlace', 'studyLevel', 'guardianName', 'guardianPhone']
                .includes(field);
            const isDetail = ['jerseyNumber', 'position', 'fitness', 'rating'].includes(field);

            let ref;
            if (isPlayer) ref = db.ref('academy/players/' + playerId);
            else if (isDetail) ref = db.ref('academy/playerDetails/' + playerId);
            else return;

            const update = {};
            if (field === 'fitness' || field === 'jerseyNumber') update[field] = parseInt(newVal) || 0;
            else if (field === 'rating') update[field] = parseFloat(newVal) || 0;
            else update[field] = newVal;

            ref.update(update).then(() => {
                if (isPlayer) {
                    const p = DATA.players.find(x => x.id === playerId);
                    if (p) p[field] = newVal;
                } else if (isDetail) {
                    if (!DATA.playerDetails[playerId]) DATA.playerDetails[playerId] = {};
                    DATA.playerDetails[playerId][field] = field === 'fitness' || field === 'jerseyNumber' ?
                        parseInt(newVal) : field === 'rating' ? parseFloat(newVal) : newVal;
                }
                showToast('✅ تم التحديث', 'success');
                addLog('تعديل لاعب', `تعديل ${label}`);
                showPlayerDetail(playerId);
            }).catch(() => showToast('خطأ في التحديث', 'error'));
        }

        function editStat(playerId, key, current, label) {
            const newVal = prompt(`تعديل ${label}`, current);
            if (newVal === null || newVal === current) return;
            const val = parseInt(newVal) || 0;
            const update = {};
            update[key] = val;
            db.ref('academy/playerDetails/' + playerId).update(update).then(() => {
                if (!DATA.playerDetails[playerId]) DATA.playerDetails[playerId] = {};
                DATA.playerDetails[playerId][key] = val;
                showToast('✅ تم التحديث', 'success');
                addLog('تعديل إحصائية', `تعديل ${label}`);
                showPlayerDetail(playerId);
            }).catch(() => showToast('خطأ في التحديث', 'error'));
        }

        // ---- 9.3 Payment ----
        function togglePayment(playerId, monthKey) {
            if (currentUser.role === 'parent') { showToast('ليس لديك صلاحية', 'warning'); return; }
            const payment = DATA.payments.find(p => p.playerId === playerId);
            const monthly = payment?.monthly || {};
            const current = monthly[monthKey] || { paid: false };
            current.paid = !current.paid;
            const ref = payment ? db.ref('academy/payments/' + payment.id) : db.ref('academy/payments').push();
            const data = { playerId, monthly: { ...monthly, [monthKey]: current }, status: 'active',
                date: new Date().toISOString() };
            ref.set(data).then(() => {
                const idx = DATA.payments.findIndex(p => p.playerId === playerId);
                if (idx !== -1) DATA.payments[idx].monthly = { ...monthly, [monthKey]: current };
                else DATA.payments.push({ playerId, monthly: { ...monthly, [monthKey]: current }, status: 'active' });
                showToast('✅ تم تحديث الدفع', 'success');
                addLog('تحديث دفع', `تحديث دفع شهر ${monthKey}`);
                showPlayerDetail(playerId);
            }).catch(() => showToast('خطأ في التحديث', 'error'));
        }

        function updateSessionPlayersList(categoryId) {
            const container = document.getElementById('sessionPlayersList');
            if (!container) return;
            const players = DATA.players.filter(p => p.categoryId === categoryId && p.status === 'approved');
            if (players.length === 0) {
                container.innerHTML = `<p class="text-muted">لا يوجد لاعبين في هذه الفئة</p>`;
                return;

            const selected = window._sessionSelectedPlayers || [];

                </label>
            `).join('');
        }

        function toggleSessionPlayer(el) {
            const id = el.value;
            if (el.checked) {
                if (!window._sessionSelectedPlayers.includes(id)) window._sessionSelectedPlayers.push(id);
            } else {
                window._sessionSelectedPlayers = window._sessionSelectedPlayers.filter(p => p !== id);
            }
        }

        function selectAllSessionPlayers() {
            document.querySelectorAll('#sessionPlayersList input[type=checkbox]').forEach(c => c.checked = true);
            window._sessionSelectedPlayers = Array.from(document.querySelectorAll('#sessionPlayersList input[type=checkbox]:checked'))
                .map(c => c.value);
        }

        function deselectAllSessionPlayers() {
            document.querySelectorAll('#sessionPlayersList input[type=checkbox]').forEach(c => c.checked = false);
            window._sessionSelectedPlayers = [];
        }

        function saveSession() {
            const title = document.getElementById('sessionTitle').value.trim();
            const date = document.getElementById('sessionDate').value;
            const start = document.getElementById('sessionStart').value;
            const end = document.getElementById('sessionEnd').value;
            const categoryId = document.getElementById('sessionCategory').value;
            const type = document.getElementById('sessionType').value;
            const field = document.getElementById('sessionField').value.trim();
            const playersList = window._sessionSelectedPlayers || [];

            if (!date || !start || !end || !categoryId || !type) {
                showToast('الرجاء ملء الحقول الإجبارية', 'warning');
                return;
            }

            const coachId = currentUser.id || '';
            const coachName = currentUser.name || 'غير محدد';
            const dayName = new Date(date + 'T00:00:00').toLocaleDateString('ar-EG', { weekday: 'long' });

            const data = {
                title: title || 'حصة تدريبية',
                date,
                day: dayName,
                startTime: start,
                endTime: end,
                categoryId,
                coachId,
                coachName,
                field: field || 'غير محدد',
                trainingType: type,
                status: 'مجدولة',
                playersList,
                attendance: {},
                ratings: {},
                notes: {},
                createdAt: new Date().toISOString()
            };

            db.ref('academy/trainingSessions').push(data)
                .then(() => {
                    showToast('✅ تم إنشاء الحصة', 'success');
                    addLog('إنشاء حصة', `تم إنشاء حصة تدريبية للفئة ${categoryId}`);
                    closeModal('createSessionModal');
                    loadAllData().then(() => {
                        if (currentUser.role === 'coach') renderMySessions();
                        else renderSessions();
                    });
                })
                .catch(() => showToast('خطأ في الحفظ', 'error'));
        }

                        document.getElementById(uploadId).classList.add('has-file');
                    }
                });
            });
        }

        function saveMatch() {
            const homeTeam = document.getElementById('matchHome').value.trim();
            const awayTeam = document.getElementById('matchAway').value.trim();
            const date = document.getElementById('matchDate').value;
            const time = document.getElementById('matchTime').value;
            const venue = document.getElementById('matchVenue').value.trim();
            const categoryId = document.getElementById('matchCategory').value;
            const referee = document.getElementById('matchReferee').value.trim();
            if (!homeTeam || !awayTeam || !date || !time || !venue || !categoryId) {
                showToast('الرجاء ملء الحقول', 'warning');
                return;
            }

            const homeLogoFile = document.getElementById('homeLogo').files[0];
            const awayLogoFile = document.getElementById('awayLogo').files[0];

            const readFile = (file) => new Promise(resolve => {
                if (!file) resolve(null);
                else { const r = new FileReader();
                    r.onload = e => resolve(e.target.result);
                    r.readAsDataURL(file); }
            });

            Promise.all([readFile(homeLogoFile), readFile(awayLogoFile)])
                .then(([homeLogoData, awayLogoData]) => {
                    const data = {
                        homeTeam,
                        awayTeam,
                        date,
                        time,
                        venue,
                        categoryId,
                        referee: referee || '',
                        homeLogo: homeLogoData || '',
                        awayLogo: awayLogoData || '',
                        status: 'مجدولة',
                        homeScore: 0,
                        awayScore: 0,
                        createdAt: new Date().toISOString()
                    };
                    return db.ref('academy/matches').push(data);
                })
                .then(() => {
                    showToast('✅ تم إنشاء المباراة', 'success');
                    addLog('إنشاء مباراة', `مباراة بين ${homeTeam} و ${awayTeam}`);
                    closeModal('createMatchModal');
                    loadAllData().then(() => renderMatches());
                })
                .catch(() => showToast('خطأ في الحفظ', 'error'));
        }

        function completeMatch(id) {
            const m = DATA.matches.find(x => x.id === id);
            if (!m) { showToast('المباراة غير موجودة', 'error'); return; }
            const home = prompt(`نتيجة ${m.homeTeam}:`, '0');
            if (home === null) return;
            const away = prompt(`نتيجة ${m.awayTeam}:`, '0');
            if (away === null) return;
            const hScore = parseInt(home) || 0;
            const aScore = parseInt(away) || 0;
            db.ref('academy/matches/' + id).update({ status: 'مكتملة', homeScore: hScore, awayScore: aScore })
                .then(() => {
                    if (m) { m.status = 'مكتملة';
                        m.homeScore = hScore;
                        m.awayScore = aScore; }
                    showToast('✅ تم إنهاء المباراة', 'success');
                    addLog('إنهاء مباراة', `النتيجة ${hScore}-${aScore}`);
                    if (currentUser.role === 'coach') renderMyMatches();
                    else renderMatches();
                })
                .catch(() => showToast('خطأ في إنهاء المباراة', 'error'));
        }

        function deleteMatch(id) {
            if (!confirm('حذف هذه المباراة؟')) return;
            db.ref('academy/matches/' + id).remove()
                .then(() => {
                    DATA.matches = DATA.matches.filter(m => m.id !== id);
                    showToast('✅ تم حذف المباراة', 'success');
                    addLog('حذف مباراة', `تم حذف مباراة`);
                    if (currentUser.role === 'coach') renderMyMatches();
                    else renderMatches();
                })
                .catch(() => showToast('خطأ في الحذف', 'error'));
        }

        function viewMatchReport(id) {
            const m = DATA.matches.find(x => x.id === id);
            if (!m) { showToast('المباراة غير موجودة', 'error'); return; }
            alert(`📊 تقرير المباراة\n${m.homeTeam} ${m.homeScore||0} - ${m.awayScore||0} ${m.awayTeam}\n\nالتاريخ: ${m.date}\nالملعب: ${m.venue}`);
        }

                        <div class="form-group"><label>الفئة</label><select id="tournamentCategory">${['U07','U09','U11','U13'].map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>

                                <input type="text" id="tournamentActivityInput" placeholder="نشاط" style="flex:1; min-width:120px;" />

            document.body.appendChild(modal);

            document.getElementById('tournamentCategory').addEventListener('change', function() {
                updateTournamentPlayersList(this.value);
            });
            document.getElementById('tournamentLogo').addEventListener('change', function() {
                if (this.files[0]) {
                    document.getElementById('tournamentLogoName').textContent = '✅ ' + this.files[0].name;
                    document.getElementById('tournamentLogoUpload').classList.add('has-file');
                }
            });
            // تحديث قائمة اللاعبين
            setTimeout(() => {
                const cat = document.getElementById('tournamentCategory').value;
                if (cat) updateTournamentPlayersList(cat);
            }, 100);
        }

        function updateTournamentPlayersList(categoryId) {
            const container = document.getElementById('tournamentPlayersList');
            if (!container) return;
            const players = DATA.players.filter(p => p.categoryId === categoryId && p.status === 'approved');
            if (players.length === 0) {
                container.innerHTML = `<p class="text-muted">لا يوجد لاعبين في هذه الفئة</p>`;
                return;
            }
            container.innerHTML = players.map(p => `
                <label style="display:flex; align-items:center; gap:10px; padding:4px 8px; border-bottom:1px solid rgba(255,255,255,0.03); cursor:pointer;">
                    <input type="checkbox" value="${p.id}" onchange="toggleTournamentPlayer(this)" />
                    <span>${p.firstName} ${p.lastName}</span>
                </label>
            `).join('');
        }

        function toggleTournamentPlayer(el) {
            const id = el.value;
            if (el.checked) {
                if (!_tournamentSelectedPlayers.includes(id)) _tournamentSelectedPlayers.push(id);
            } else {
                _tournamentSelectedPlayers = _tournamentSelectedPlayers.filter(p => p !== id);
            }
        }

        function selectAllTournamentPlayers() {
            document.querySelectorAll('#tournamentPlayersList input[type=checkbox]').forEach(c => c.checked = true);
            _tournamentSelectedPlayers = Array.from(document.querySelectorAll('#tournamentPlayersList input[type=checkbox]:checked'))
                .map(c => c.value);
        }

        function deselectAllTournamentPlayers() {
            document.querySelectorAll('#tournamentPlayersList input[type=checkbox]').forEach(c => c.checked = false);
            _tournamentSelectedPlayers = [];
        }

        function addTournamentStaff() {
            const input = document.getElementById('tournamentStaffInput');
            if (!input) return;
            const name = input.value.trim();
            if (!name) { showToast('أدخل اسم العضو', 'warning'); return; }
            _tournamentStaff.push(name);
            input.value = '';
            renderTournamentStaffList();
        }

        function renderTournamentStaffList() {
            const container = document.getElementById('tournamentStaffList');
            if (!container) return;
            container.innerHTML = _tournamentStaff.map((s, i) =>
                `<span style="background:rgba(255,255,255,0.04); padding:4px 12px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; font-size:0.8rem;">${s} <button onclick="_tournamentStaff.splice(${i},1); renderTournamentStaffList();" style="background:none; border:none; color:#ff4757; cursor:pointer;">✕</button></span>`
            ).join('');
        }

        function addTournamentActivity() {
            const input = document.getElementById('tournamentActivityInput');
            if (!input) return;
            const act = input.value.trim();
            if (!act) { showToast('أدخل النشاط', 'warning'); return; }
            _tournamentActivities.push(act);
            input.value = '';
            renderTournamentActivitiesList();
        }

        function renderTournamentActivitiesList() {
            const container = document.getElementById('tournamentActivitiesList');
            if (!container) return;
            container.innerHTML = _tournamentActivities.map((a, i) =>
                `<span style="background:rgba(255,255,255,0.04); padding:4px 12px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; font-size:0.8rem;">${a} <button onclick="_tournamentActivities.splice(${i},1); renderTournamentActivitiesList();" style="background:none; border:none; color:#ff4757; cursor:pointer;">✕</button></span>`
            ).join('');
        }

        function saveTournament() {
            const name = document.getElementById('tournamentName').value.trim();
            const categoryId = document.getElementById('tournamentCategory').value;
            const startDate = document.getElementById('tournamentStart').value;
            const endDate = document.getElementById('tournamentEnd').value;
            if (!name || !categoryId || !startDate) {
                showToast('الرجاء ملء الحقول الإجبارية', 'warning');
                return;
            }
            const logoFile = document.getElementById('tournamentLogo').files[0];
            const processSave = (logoData) => {
                const data = {
                    name,
                    categoryId,
                    startDate,
                    endDate: endDate || '',
                    logo: logoData || '',
                    players: _tournamentSelectedPlayers,
                    staff: _tournamentStaff,
                    activities: _tournamentActivities,
                    status: 'نشطة',
                    createdAt: new Date().toISOString()
                };
                db.ref('academy/tournaments').push(data)
                    .then(() => {
                        showToast('✅ تم إنشاء الدورة', 'success');
                        addLog('إنشاء دورة', `تم إنشاء دورة ${name}`);
                        closeModal('createTournamentModal');
                        loadAllData().then(() => renderTournaments());
                    })
                    .catch(() => showToast('خطأ في الحفظ', 'error'));
            };
            if (logoFile) {
                const reader = new FileReader();
                reader.onload = e => processSave(e.target.result);
                reader.readAsDataURL(logoFile);
            } else {
                processSave(null);
            }
        }

            const t = DATA.tournaments.find(x => x.id === id);
            if (!t) { showToast('الدورة غير موجودة', 'error'); return; }
            alert(`🏆 ${t.name}\nالفئة: ${t.categoryId}\nالبداية: ${t.startDate}\nالنهاية: ${t.endDate || 'غير محددة'}\nاللاعبون: ${(t.players||[]).length}\nالطاقم: ${(t.staff||[]).join(', ')}\nالنشاطات: ${(t.activities||[]).join(', ')}`);
        }

        function completeTournament(id) {
            if (!confirm('إنهاء هذه الدورة؟')) return;
            db.ref('academy/tournaments/' + id).update({ status: 'مكتملة' })
                .then(() => {
                    const t = DATA.tournaments.find(x => x.id === id);
                    if (t) t.status = 'مكتملة';
                    showToast('✅ تم إنهاء الدورة', 'success');
                    addLog('إنهاء دورة', `تم إنهاء دورة`);
                    renderTournaments();
                })
                .catch(() => showToast('خطأ في إنهاء الدورة', 'error'));
        }

            db.ref('academy/tournaments/' + id).remove()
                .then(() => {
                    DATA.tournaments = DATA.tournaments.filter(t => t.id !== id);
                    showToast('✅ تم حذف الدورة', 'success');
                    addLog('حذف دورة', `تم حذف دورة`);
                    renderTournaments();

        function addLog(action, details) {
            const entry = {
                action,
                details,
                userRole: currentUser?.role || 'unknown',
                userName: currentUser?.name || 'مستخدم',
                timestamp: new Date().toISOString(),
                timeFormatted: new Date().toLocaleTimeString('fr-FR', { hour12: false })
            };
            if (db) {
                db.ref('academy/logs').push(entry).catch(() => {});
            }
            DATA.logs.push({ id: Date.now(), ...entry });
        }
